workflows:
  ios-testflight:
    name: GINX iOS - TestFlight
    max_build_duration: 60
    instance_type: mac_mini_m2

    integrations:
      app_store_connect: Codemagic

    environment:
      groups:
        - ios_signing
      vars:
        XCODE_WORKSPACE: ios/App/App.xcworkspace
        XCODE_SCHEME: App
        BUNDLE_ID: com.ginx.app
      node: 20.17.0

    scripts:
      - name: Install npm dependencies
        script: npm ci

      - name: Build web assets
        script: npm run build

      - name: Capacitor copy iOS
        script: npx cap copy ios

      - name: Install CocoaPods
        script: |
          # Capacitor 8 requires iOS 16.0 minimum
          sed -i '' "s/platform :ios, '14.0'/platform :ios, '16.0'/" ios/App/Podfile
          cd ios/App
          pod install

      - name: Set build number
        script: |
          xcrun agvtool new-version -all $BUILD_NUMBER
        working_directory: ios/App

      - name: Set up keychain and signing
        script: |
          keychain initialize

          # DEBUG: show raw certificate list output so we know the format
          echo "=== RAW CERT LIST ==="
          RAW=$(app-store-connect certificates list --type DISTRIBUTION 2>&1 || true)
          echo "$RAW"
          echo "=== END RAW CERT LIST ==="

          # Extract IDs from lines like "Id: 97A9S824HW"
          CERT_IDS=$(echo "$RAW" | awk '/^Id: /{print $2}' || true)
          echo "=== IDs to revoke: [$CERT_IDS] ==="

          for cid in $CERT_IDS; do
            echo "Revoking: $cid"
            app-store-connect certificates delete "$cid" || true
          done

          # Use a persistent private key stored as env variable
          echo "$CERT_PRIVATE_KEY" | base64 --decode > /tmp/cert_key.pem

          app-store-connect fetch-signing-files \
            "$BUNDLE_ID" \
            --type IOS_APP_STORE \
            --create \
            --certificate-key @file:/tmp/cert_key.pem \
            --p12-password ""

          keychain add-certificates

      - name: Build iOS IPA
        script: |
          # Patch Xcode project with correct Team ID, bundle ID and deployment target
          PROJECT="ios/App/App.xcodeproj/project.pbxproj"
          sed -i '' 's/DEVELOPMENT_TEAM = "";/DEVELOPMENT_TEAM = CDZRQL6QF6;/g' "$PROJECT"
          sed -i '' 's/CODE_SIGN_STYLE = Automatic;/CODE_SIGN_STYLE = Manual;/g' "$PROJECT"
          sed -i '' 's/PRODUCT_BUNDLE_IDENTIFIER = .*;/PRODUCT_BUNDLE_IDENTIFIER = com.ginx.app;/g' "$PROJECT"
          sed -i '' 's/IPHONEOS_DEPLOYMENT_TARGET = 14.0;/IPHONEOS_DEPLOYMENT_TARGET = 16.0;/g' "$PROJECT"
          sed -i '' 's/IPHONEOS_DEPLOYMENT_TARGET = 13.0;/IPHONEOS_DEPLOYMENT_TARGET = 16.0;/g' "$PROJECT"

          xcode-project use-profiles

          # Get the name of the installed provisioning profile for com.ginx.app
          PROFILE_NAME=$(ls ~/Library/MobileDevice/Provisioning\ Profiles/*.mobileprovision 2>/dev/null | while read f; do security cms -D -i "$f" 2>/dev/null | python3 -c "import sys,plistlib; p=plistlib.loads(sys.stdin.buffer.read()); app_id=p.get('Entitlements',{}).get('application-identifier',''); print(p.get('Name','')) if 'com.ginx.app' in app_id else None" 2>/dev/null; done | grep -v '^None$' | head -1)
          echo "Provisioning profile name: [$PROFILE_NAME]"

          python3 -c "import plistlib,sys; d={'method':'app-store','teamID':'CDZRQL6QF6','signingStyle':'manual','signingCertificate':'Apple Distribution','provisioningProfiles':{'com.ginx.app':sys.argv[1]},'uploadSymbols':True}; plistlib.dump(d,open('/tmp/export_options.plist','wb'))" "$PROFILE_NAME"

          xcode-project build-ipa \
            --workspace "$XCODE_WORKSPACE" \
            --scheme "$XCODE_SCHEME" \
            --export-options-plist /tmp/export_options.plist

    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log

    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
