workflows:
  ios-testflight:
    name: GINX iOS - TestFlight
    max_build_duration: 60
    instance_type: mac_mini_m2

    integrations:
      app_store_connect: Codemagic

    environment:
      vars:
        XCODE_WORKSPACE: ios/App/App.xcworkspace
        XCODE_SCHEME: App
        BUNDLE_ID: com.ginx.app
      node: 20.17.0

    scripts:
      - name: Install npm dependencies
        script: npm ci

      - name: Build web assets
        script: npm run build

      - name: Capacitor copy iOS
        script: npx cap copy ios

      - name: Install CocoaPods
        script: |
          # Capacitor 8 requires iOS 16.0 minimum
          sed -i '' "s/platform :ios, '14.0'/platform :ios, '16.0'/" ios/App/Podfile
          cd ios/App
          pod install

      - name: Set build number
        script: |
          xcrun agvtool new-version -all $BUILD_NUMBER
        working_directory: ios/App

      - name: Set up keychain and signing
        script: |
          keychain initialize
          openssl genrsa -out /tmp/cert_key.pem 2048
          app-store-connect fetch-signing-files \
            "$BUNDLE_ID" \
            --type IOS_APP_STORE \
            --create \
            --certificate-key @file:/tmp/cert_key.pem \
            --p12-password ""
          keychain add-certificates

      - name: Build iOS IPA
        script: |
          # Patch Xcode project with correct Team ID and bundle ID
          PROJECT="ios/App/App.xcodeproj/project.pbxproj"
          sed -i '' 's/DEVELOPMENT_TEAM = "";/DEVELOPMENT_TEAM = CDZRQL6QF6;/g' "$PROJECT"
          sed -i '' 's/CODE_SIGN_STYLE = Automatic;/CODE_SIGN_STYLE = Manual;/g' "$PROJECT"
          sed -i '' 's/PRODUCT_BUNDLE_IDENTIFIER = .*;/PRODUCT_BUNDLE_IDENTIFIER = com.ginx.app;/g' "$PROJECT"

          xcode-project use-profiles

          cat > /tmp/export_options.plist << 'EOF'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>method</key>
              <string>app-store</string>
              <key>teamID</key>
              <string>CDZRQL6QF6</string>
              <key>uploadSymbols</key>
              <true/>
          </dict>
          </plist>
          EOF

          xcode-project build-ipa \
            --workspace "$XCODE_WORKSPACE" \
            --scheme "$XCODE_SCHEME" \
            --export-options-plist /tmp/export_options.plist

    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log

    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
