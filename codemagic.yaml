workflows:
  ios-testflight:
    name: GINX iOS - TestFlight
    max_build_duration: 60
    instance_type: mac_mini_m2

    integrations:
      app_store_connect: Codemagic

    environment:
      vars:
        XCODE_WORKSPACE: ios/App/App.xcworkspace
        XCODE_SCHEME: App
        BUNDLE_ID: com.ginx.app
      node: 20.17.0

    scripts:
      - name: Install npm dependencies
        script: npm ci

      - name: Build web assets
        script: npm run build

      - name: Capacitor copy iOS
        script: npx cap copy ios

      - name: Install CocoaPods
        script: |
          # Capacitor 8 requires iOS 16.0 minimum
          sed -i '' "s/platform :ios, '14.0'/platform :ios, '16.0'/" ios/App/Podfile
          cd ios/App
          pod install

      - name: Set build number
        script: |
          xcrun agvtool new-version -all $BUILD_NUMBER
        working_directory: ios/App

      - name: Set up keychain and signing
        script: |
          keychain initialize
          openssl genrsa -out /tmp/cert_key.pem 2048
          app-store-connect fetch-signing-files \
            "$BUNDLE_ID" \
            --type IOS_APP_STORE \
            --create \
            --certificate-key @file:/tmp/cert_key.pem \
            --p12-password ""
          keychain add-certificates

      - name: Build iOS IPA
        script: |
          xcode-project use-profiles
          xcode-project build-ipa \
            --workspace "$XCODE_WORKSPACE" \
            --scheme "$XCODE_SCHEME"

    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log

    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
